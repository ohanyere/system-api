apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: system-api-alerts
  labels:
    app.kubernetes.io/name: system-api
    release: prometheus
spec:
  groups:
    - name: system-api.availability
      rules:
        - alert: system-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="system-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="system-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Developer Experience
          annotations:
            summary: system-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: system-apiUnavailable
          expr: up{job="system-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Developer Experience
          annotations:
            summary: system-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
